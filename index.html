<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="icon" href="https://avatarfiles.alphacoders.com/105/thumb-1920-105490.gif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <title>wired/home</title>
    <style>
        body {
            background-image: url(https://i.pinimg.com/originals/d7/64/84/d76484f755763b87d45ec9c56e21b37c.gif);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Courier', monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .con {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 80%;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(1px);
        }
        .header {
            width: 40%;
            padding: 50px 50px 20px 50px;
            color: white;
        }
        .links_con {
            width: 80%;
            margin-bottom: 80px;
        }
        .button {
            border-radius: 15px;
            width: 30%;
            text-align: left;
            margin: 1% auto;
            padding: 1% 1% 1% 3%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(3px);
        }
        .button:hover {
            background: rgb(255, 255, 255);
            color: black;
            cursor: pointer;
            transform: scale(1.03);
            transition: 0.3s;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.9);
        }
        a {
            color: black;
            text-decoration: none;
            font-size: 1.2em;
        }
        @media (max-width: 700px) {
        body {
            background-attachment: fixed;
            background-position: center;
        }
        .header {
            width: 90%;
            padding: 30px 20px 15px 20px;
        }
        .header h1 {
            font-size: 2em;
        }
        .links_con {
            width: 90%;
            margin-bottom: 40px;
        }
        .button {
            width: 90%;
        }
        .con {
            width: 92%;
            margin: 40px auto;
        }
    }
    .cursor {
        animation: blink 0.8s step-end infinite;
    }
    @keyframes blink {
        50% { opacity: 0; }
    }

    </style>
</head>
<body>
    <div class="con">
        <div class="header">
            <p id="clock" style="font-size: 0.9em; opacity: 0.7; margin-top: -10px;"></p>
            <h1 style="font-size: 3em;" id="typing-heading"></h1>
            <p style="text-align: left;">err... hi. i'm a delulu cs undergrad with 14hrs of screentime and a strict diet of caffeine, sucrose(and/or fructose) and pessimism. i live most of my life on the wired, you can find me here:</p>
        </div>
        <div class="links_con">
            <div class="button">
                <a target="_blank" href="https://github.com/reynkunoncaffeine">>wired/git</a>
            </div>
            <div class="button">
                <a target="_blank" href="https://www.youtube.com/@that_nerd_sp">>wired/youtube</a>
            </div>
            <div class="button">
                <a target="_blank" href="https://www.reddit.com/user/uchiha_reyn/">>wired/reddit</a>
            </div>
            <div class="button">
                <a target="_blank" href="https://www.instagram.com/that_nerd_sp/">>wired/instagram</a>
            </div>
            <div class="button">
                <a target="_blank" href="mailto:wired.sreyan@gmail.com">>wired/mail</a>
            </div>
            <div class="button">
                <a target="_blank" href="upi://pay?pa=9776686086%40upi&pn=">>wired/caffeine fund</a>
            </div>
        </div>
    </div>
    <script>
        const text = ">wired/home";
        const el = document.getElementById("typing-heading");
        let i = 0;

        function typeChar() {
            if (i < text.length) {
                el.textContent += text.charAt(i);
                i++;
                setTimeout(typeChar, 100); // typing speed in ms
            } else {
                el.innerHTML += '<span class="cursor">_</span>';
            }
        }
        

        typeChar();
        const originalTitle = document.title;
        const awayTitle = "come back...";

        document.addEventListener("visibilitychange", () => {
            document.title = document.hidden ? awayTitle : originalTitle;
        });
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        updateClock();
        setInterval(updateClock, 1000);


        const glitchChars = "!<>-_\\/—=+*^?#________";
        const originalText = ">wired/home";

        function glitchOnce() {
            const el = document.getElementById("typing-heading");
            if (!el || el.textContent.length < originalText.length) return;

            const pos = Math.floor(Math.random() * originalText.length);
            const glitchedChar = glitchChars.charAt(Math.floor(Math.random() * glitchChars.length));

            const chars = originalText.split("");
            chars[pos] = glitchedChar;
            el.childNodes[0].textContent = chars.join("");

            setTimeout(() => {
                el.childNodes[0].textContent = originalText;
            }, 100); // how long the glitch shows before reverting
        }

        setInterval(glitchOnce, 1000);
    </script>
</body>
</html>
